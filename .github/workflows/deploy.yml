name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          REDIS_URL:           ${{ secrets.REDIS_URL }}
          DASHBOARD_ORIGIN:    ${{ secrets.DASHBOARD_ORIGIN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          envs:     DATABASE_URL,REDIS_URL,DASHBOARD_ORIGIN,NEXT_PUBLIC_API_URL
          script: |
            set -e

            # Garante que o repo exista na VPS
            if [ ! -d ~/mini-sentry ]; then
              git clone https://github.com/Josefelipedev/mini-sentry.git ~/mini-sentry
            fi

            cd ~/mini-sentry
            git pull origin main

            # Escreve o .env.prod com os secrets do GitHub
            printf 'DATABASE_URL=%s\nREDIS_URL=%s\nPORT=3001\nNODE_ENV=production\nDASHBOARD_ORIGIN=%s\nNEXT_PUBLIC_API_URL=%s\nAPI_RATE_LIMIT_MAX=200\nAPI_RATE_LIMIT_WINDOW_MS=60000\nINGEST_RATE_LIMIT_MAX=500\nINGEST_RATE_LIMIT_WINDOW_MS=60000\n' \
              "$DATABASE_URL" "$REDIS_URL" "$DASHBOARD_ORIGIN" "$NEXT_PUBLIC_API_URL" \
              > deploy/.env.prod

            # Aplica o schema no Postgres (cria tabelas se não existirem)
            docker exec thechats-postgres psql \
              -U postgres \
              -c "CREATE DATABASE mini_sentry;" 2>/dev/null || true
            docker exec -i thechats-postgres psql -U postgres -d mini_sentry < deploy/schema.sql

            # Build e restart
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            echo "✅ Deploy concluído — $(date)"
